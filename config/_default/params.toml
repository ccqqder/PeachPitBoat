mainSections = ["posts"]
copyright = "© { year } QQder (ChengChe Lee · qqder339@gmail.com)"
colorScheme = "braun"
defaultAppearance = "dark"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
# Emit BreadcrumbList JSON-LD on Article, MobileApplication, and
# CollectionPage (everything except home). Generated by
# layouts/partials/schema.html from .Ancestors.
enableStructuredBreadcrumbs = true
# Fallback OG/Twitter image used when a page has no featured/cover/thumbnail
# resource. 1200×630 branded image generated by tools/generate_og_image.py.
defaultSocialImage = "https://ccqqder.github.io/PeachPitBoat/images/og-default.png"

[header]
  layout = "basic"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  showRecent = true
  showRecentItems = 5
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = false
  featuredPosts = ["stonestory_thermodynamics", "gantt-planet-intro"]

[article]
  showDate = true
  showDateUpdated = false
  showAuthor = true
  showBreadcrumbs = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showZenMode = false

[list]
  showBreadcrumbs = true
  showSummary = true
  groupByYear = true
