<div class="app-card">
    <span class="icon">{{ .Get "icon" }}</span>
    <div>
        <h3>{{ .Get "name" }}</h3>
        <p>{{ .Get "desc" }}</p>
        {{ if ne (.Get "url") "#" }}
        <a href="{{ .Get "url" }}" target="_blank" rel="noopener" class="store-btn">App Store</a>
        {{ end }}
    </div>
</div>
