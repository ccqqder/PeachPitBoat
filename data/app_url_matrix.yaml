    - Signature numérique — les enregistrements sont signés avec une clé sur l'appareil.
    - Filigrane audio — insertion dans l'enregistrement d'un signal proche de l'ultrason vérifiable.
    - Vérificateur intégré — rejouez image par image pour contrôler l'intégrité.
  features_ko:
