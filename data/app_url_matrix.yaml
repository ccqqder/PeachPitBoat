    - 디지털 서명 - 녹화/녹음 데이터에 온디바이스 키로 서명합니다.
    - 오디오 워터마크 - 검증 가능한 준초음파 신호를 녹음에 삽입합니다.
    - 내장 검증기로 프레임 단위 재생을 통해 무결성을 확인합니다.
