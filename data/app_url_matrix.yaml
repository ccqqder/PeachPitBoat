  description_en: Atomic Presence is a technical defense tool for interviewees, journalists, and legal evidence scenarios, centred on giving video and audio verifiable integrity.
  description_ja: インタビュー対象者、記者、法的証拠シーンのために設計された技術的防衛ツール。録画・録音に検証可能な完全性を持たせることを中心に据えています。
  features:
    - Hash Chain：即時將雜湊序列編碼成動態 QR。
    - 數位簽章：用裝置端金鑰對錄製內容簽名。
    - 音訊浮水印：在錄音中嵌入可驗證的近超音波訊號。
    - 內建驗證器：回頭逐幀比對、驗證完整性。
  features_en:
    - Hash chain — real-time encoding of the hash sequence into a dynamic QR code.
    - Digital signature — recordings are signed with an on-device key.
    - Audio watermark — a verifiable near-ultrasonic signal embedded in the recording.
    - Built-in verifier — replay frame-by-frame to check integrity.
  features_ja:
    - ハッシュチェーン：ハッシュ列をリアルタイムに動的 QR コードへエンコード。
    - デジタル署名：端末内の鍵で録画・録音内容に署名。
    - 音声ウォーターマーク：近超音波帯域に検証可能な信号を録音へ埋め込み。
    - 内蔵検証ツール：後からフレーム単位で照合し、完全性を確認。
  tagline_fr: "Face aux deepfakes et aux montages malveillants, défendez votre authenticité grâce à une hash chain cryptographique et à des signatures numériques."
  tagline_ko: "Deepfake와 악의적 편집에 맞서, 암호학적 Hash chain과 디지털 서명으로 당신의 진정성을 지키세요."
  description_fr: Atomic Presence est un outil de défense technique conçu pour les personnes interviewées, les journalistes et les contextes de preuve légale, avec pour cœur l'intégrité vérifiable de la vidéo et de l'audio.
  description_ko: Atomic Presence는 인터뷰이, 기자, 법적 증거 상황을 위한 기술적 방어 도구로, 영상과 음성의 검증 가능한 무결성을 핵심에 둡니다.
